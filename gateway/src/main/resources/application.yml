server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: users-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/users/**

        - id: products-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**

        - id: orders-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

jwt:
  secret: <tu.secret.characters>